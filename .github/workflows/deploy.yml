name: Hostpoint Deployment

on:
  push:
    branches:
      - main  # Die Pipeline startet nur bei einem Push in den Main-Branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: SSH Key einrichten
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTPOINT_SSH_PRIVATE_KEY }}

      - name: SSH Known Hosts konfigurieren
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.HOSTPOINT_HOST }} >> ~/.ssh/known_hosts

      - name: Deployment via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            ./ ${{ secrets.HOSTPOINT_USER }}@${{ secrets.HOSTPOINT_HOST }}:${{ secrets.HOSTPOINT_DEST_DIR }}
             