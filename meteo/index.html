<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap Ferret Meteo 🌊</title>
    <meta name="description" content="Aktuelles Wetter und Vorhersage für Cap Ferret.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <main class="dashboard">
        <header>
            <a href="../" style="color: white; text-decoration: none; opacity: 0.7; font-size: 0.9rem; margin-bottom: 10px; display: inline-block;">&larr; Zurück</a>
            <h1>Cap Ferret</h1>
            <p class="subtitle">Météo en direct</p>
        </header>

        <section class="weather-card glass">
            <div class="current-weather">
                <div class="temp-container">
                    <span id="current-temp" class="temperature">--</span><span class="unit">°C</span>
                </div>
                <div class="weather-info">
                    <p id="weather-desc" class="description">Lade Wetterdaten...</p>
                    <div class="details">
                        <div class="detail-item">
                            <span class="icon">💨</span>
                            <span id="wind-speed">-- km/h</span>
                        </div>
                        <div class="detail-item">
                            <span class="icon">💧</span>
                            <span id="humidity">-- %</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="forecast glass">
            <h2>Nächste Tage</h2>
            <div class="forecast-container" id="forecast-container">
                <!-- Forecast items will be injected here by JS -->
            </div>
        </section>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
